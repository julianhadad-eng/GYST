name: OpenAI Codex Code Generator

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run OpenAI Codex Code Generator
        uses: lemonberrylabs/openai-codex-action@v0.3.0
        with:
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}

